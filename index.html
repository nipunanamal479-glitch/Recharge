<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital System</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #0f172a, #312e81); font-family: sans-serif; color: white; }
        .glass-box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; text-align: center; width: 300px; }
        .hidden { display: none; }
        .card-item { background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 10px; margin: 10px 0; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .btn { padding: 10px 20px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-view" class="glass-box">
        <h1>Welcome</h1>
        <button class="btn" onclick="login()">Sign in with Google</button>
    </div>

    <div id="dashboard-view" class="glass-box hidden">
        <h3>SELECT CARD</h3>
        <div id="card-list"></div>
        <button class="btn" style="margin-top:20px; background:red; color:white;" onclick="logout()">Logout</button>
        
        <div id="card-display" class="hidden" style="margin-top:20px; padding:20px; background:#6366f1; border-radius:15px;">
            <h2 id="generatedCode">XXXX-XXXX</h2>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://recharge-card-1840c-default-rtdb.asia-southeast1.firebaseio.app" };
        firebase.initializeApp(firebaseConfig);

        function login() {
            const CLIENT_ID = '12019111383-058lqu79k9jvbdcq7brqql1ukt1028l8.apps.googleusercontent.com';
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.origin + window.location.pathname)}&response_type=token&scope=email profile&prompt=consent`;
            window.location.href = authUrl;
        }

        function logout() {
            localStorage.removeItem('user_token');
            window.location.reload();
        }

        window.onload = function() {
            const token = new URLSearchParams(window.location.hash.substring(1)).get('access_token');
            if (token) { localStorage.setItem('user_token', token); window.location.hash = ""; }
            if (localStorage.getItem('user_token')) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('dashboard-view').classList.remove('hidden');
                renderCards();
            }
        };
    </script>
</body>
</html>
