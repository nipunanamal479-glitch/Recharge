<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Digital Recharge</title>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="data.js"></script>

<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-glass: rgba(30, 41, 59, 0.7);
    --border: rgba(148, 163, 184, 0.15);
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --danger: #ef4444;
    --danger-hover: #dc2626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(59,130,246,0.15), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(99,102,241,0.12), transparent 40%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
  }

  .hidden { display: none !important; }

  /* ---------- Login Screen ---------- */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    background: var(--panel-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .login-card .logo {
    font-size: 40px;
    margin-bottom: 8px;
  }

  .login-card h1 {
    font-size: 22px;
    margin-bottom: 6px;
  }

  .login-card p {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 28px;
  }

  #googleSignInBtn {
    display: flex;
    justify-content: center;
    min-height: 4px;
  }

  /* ---------- App Shell ---------- */
  #appScreen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--panel-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  header h2 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .account-wrap {
    position: relative;
  }

  #accountBtn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #accountBtn:hover { background: #273449; }

  #accountDropdown {
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    min-width: 180px;
    padding: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 60;
  }

  #accountDropdown .user-name {
    font-size: 13px;
    color: var(--text-dim);
    padding: 4px 8px 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    word-break: break-word;
    white-space: pre-line;
  }

  #logoutBtn {
    width: 100%;
    background: var(--danger);
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  #logoutBtn:hover { background: var(--danger-hover); }

  main {
    flex: 1;
    padding: 24px 16px 60px;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  .panel {
    background: var(--panel-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }

  .panel h3 {
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 16px;
    text-align: center;
    font-weight: 500;
  }

  /* ---------- Card Grid ---------- */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .recharge-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }

  .recharge-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    background: #243348;
  }

  .recharge-card .icon {
    font-size: 26px;
    margin-bottom: 8px;
  }

  .recharge-card .amount {
    font-size: 15px;
    font-weight: 700;
  }

  /* ---------- Selected Card Screen ---------- */
  #selectedView .panel {
    text-align: center;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { color: var(--text); }

  .selected-amount-display {
    background: linear-gradient(135deg, var(--accent), #6366f1);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .selected-amount-display .label {
    font-size: 13px;
    opacity: 0.85;
    margin-bottom: 6px;
  }

  .selected-amount-display .value {
    font-size: 32px;
    font-weight: 800;
  }

  #generateCodeBtn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  #generateCodeBtn:hover { background: var(--accent-hover); }
  #generateCodeBtn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .hint {
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--text-dim);
  }

  .generated-code-box {
    margin-top: 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }

  .generated-code-box .label {
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .generated-code-box .value {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 4px;
    color: #4ade80;
  }

  @media (max-width: 380px) {
    .recharge-card .amount { font-size: 13px; }
    .selected-amount-display .value { font-size: 26px; }
  }

  /* ---------- Buy button (selected card view) ---------- */
  #buyBtn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  #buyBtn:hover { background: var(--accent-hover); }
  #buyBtn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ---------- Wallet nav button ---------- */
  #walletNavBtn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
  }
  #walletNavBtn:hover { background: #273449; }

  /* ---------- Wallet View ---------- */
  .wallet-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .wallet-item:last-child { margin-bottom: 0; }

  .wallet-item-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .wallet-item-amount {
    font-size: 17px;
    font-weight: 700;
  }

  .wallet-item-status {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .wallet-item-status.pending {
    background: rgba(251, 191, 36, 0.15);
    color: #fbbf24;
  }

  .wallet-item-status.sent {
    background: rgba(74, 222, 128, 0.15);
    color: #4ade80;
  }

  .wallet-item-date {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .wallet-item-code {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #4ade80;
    margin-bottom: 8px;
  }

  .wallet-generate-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .wallet-generate-btn:hover { background: var(--accent-hover); }
  .wallet-generate-btn:disabled { opacity: 0.85; cursor: not-allowed; }

  .wallet-row-actions {
    display: flex;
    gap: 8px;
  }

  .verify-row {
    display: flex;
    gap: 8px;
  }

  .verify-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 14px;
    letter-spacing: 2px;
    outline: none;
  }
  .verify-input:focus { border-color: var(--accent); }

  .verify-btn {
    flex: 0 0 auto;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
  }
  .verify-btn:hover { background: var(--accent-hover); }

  .wallet-reset-btn {
    flex: 0 0 auto;
    background: var(--panel-glass);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .wallet-reset-btn:hover { color: var(--text); border-color: var(--danger); }

  .btn-spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: btn-spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes btn-spin {
    to { transform: rotate(360deg); }
  }

  .wallet-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    padding: 30px 10px;
  }

  /* ---------- Boot Loader ---------- */
  #bootLoader {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flower-spinner {
    position: relative;
    width: 56px;
    height: 56px;
  }

  .flower-spinner .petal {
    position: absolute;
    top: 0;
    left: 50%;
    width: 8px;
    height: 20px;
    margin-left: -4px;
    border-radius: 4px;
    background: var(--accent);
    transform-origin: 4px 28px;
    animation: petal-fade 1s linear infinite;
  }

  .flower-spinner .petal:nth-child(1) { transform: rotate(0deg);   animation-delay: -0.875s; }
  .flower-spinner .petal:nth-child(2) { transform: rotate(45deg);  animation-delay: -0.75s; }
  .flower-spinner .petal:nth-child(3) { transform: rotate(90deg);  animation-delay: -0.625s; }
  .flower-spinner .petal:nth-child(4) { transform: rotate(135deg); animation-delay: -0.5s; }
  .flower-spinner .petal:nth-child(5) { transform: rotate(180deg); animation-delay: -0.375s; }
  .flower-spinner .petal:nth-child(6) { transform: rotate(225deg); animation-delay: -0.25s; }
  .flower-spinner .petal:nth-child(7) { transform: rotate(270deg); animation-delay: -0.125s; }
  .flower-spinner .petal:nth-child(8) { transform: rotate(315deg); animation-delay: 0s; }

  @keyframes petal-fade {
    0%   { opacity: 1; }
    100% { opacity: 0.15; }
  }

  /* Small inline spinner used inside buttons */
  .btn-spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: btn-spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes btn-spin {
    to { transform: rotate(360deg); }
  }

  /* Full-screen overlay spinner (shown while switching accounts) */
  #authLoader {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }
</style>
</head>
<body>

  <!-- ================= BOOT LOADER ================= -->
  <div id="bootLoader">
    <div class="flower-spinner">
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
    </div>
  </div>

  <!-- ================= AUTH SWITCH LOADER (shown briefly when signing in) ================= -->
  <div id="authLoader" class="hidden">
    <div class="flower-spinner">
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
    </div>
  </div>

  <!-- ================= LOGIN SCREEN ================= -->
  <div id="loginScreen" class="hidden">
    <div class="login-card">
      <div class="logo">⚡</div>
      <h1>Digital Recharge</h1>
      <p>Sign in to continue to your dashboard</p>
      <div id="googleSignInBtn"></div>
    </div>
  </div>

  <!-- ================= APP SCREEN ================= -->
  <div id="appScreen" class="hidden">
    <header>
      <h2>Digital Recharge</h2>
      <div style="display:flex; align-items:center; gap:8px;">
        <button id="walletNavBtn">🛒 Wallet</button>
        <div class="account-wrap">
          <button id="accountBtn">👤 Account ▾</button>
          <div id="accountDropdown" class="hidden">
            <div class="user-name" id="userNameLabel">—</div>
            <button id="logoutBtn">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="container">

        <!-- ---- Dashboard view: card grid ---- -->
        <div id="dashboardView">
          <div class="panel">
            <h3>Select a recharge amount</h3>
            <div class="card-grid" id="cardGrid"></div>
          </div>
        </div>

        <!-- ---- Selected card view ---- -->
        <div id="selectedView" class="hidden">
          <button class="back-btn" id="backBtn">← Back</button>
          <div class="panel">
            <div class="selected-amount-display">
              <div class="label">Selected Card</div>
              <div class="value" id="selectedAmountLabel">—</div>
            </div>
            <button id="buyBtn">Buy Now</button>
            <p class="hint">This will be added to your wallet. You can generate the payment code from there.</p>
          </div>
        </div>

        <!-- ---- Wallet view ---- -->
        <div id="walletView" class="hidden">
          <button class="back-btn" id="walletBackBtn">← Back</button>
          <div class="panel">
            <h3>My Wallet</h3>
            <div id="walletList"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

<script>
(function () {
  "use strict";

  // ---------------- State ----------------
  let currentUser = null;     // { name, email }
  let selectedCard = null;    // CONFIG.CARDS item
  let wallet = [];            // [{ id, cardId, label, amount, code, status, createdAt }]

  // ---------------- DOM refs ----------------
  const bootLoader = document.getElementById("bootLoader");
  const authLoader = document.getElementById("authLoader");
  const loginScreen = document.getElementById("loginScreen");
  const appScreen = document.getElementById("appScreen");
  const accountBtn = document.getElementById("accountBtn");
  const accountDropdown = document.getElementById("accountDropdown");
  const logoutBtn = document.getElementById("logoutBtn");
  const userNameLabel = document.getElementById("userNameLabel");
  const walletNavBtn = document.getElementById("walletNavBtn");

  const dashboardView = document.getElementById("dashboardView");
  const selectedView = document.getElementById("selectedView");
  const walletView = document.getElementById("walletView");
  const cardGrid = document.getElementById("cardGrid");
  const selectedAmountLabel = document.getElementById("selectedAmountLabel");
  const buyBtn = document.getElementById("buyBtn");
  const backBtn = document.getElementById("backBtn");
  const walletBackBtn = document.getElementById("walletBackBtn");
  const walletList = document.getElementById("walletList");

  // ---------------- Init EmailJS ----------------
  if (window.emailjs) {
    emailjs.init({ publicKey: CONFIG.EMAILJS_PUBLIC_KEY });
  }

  // ---------------- Utility: JWT decode ----------------
  function decodeJwt(token) {
    try {
      const base64Url = token.split(".")[1];
      const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
      const jsonPayload = decodeURIComponent(
        atob(base64)
          .split("")
          .map((c) => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2))
          .join("")
      );
      return JSON.parse(jsonPayload);
    } catch (e) {
      console.error("Failed to decode JWT:", e);
      return null;
    }
  }

  // ---------------- Wallet storage helpers ----------------
  // IMPORTANT: wallet is namespaced per-account (by email) so switching
  // Google accounts never shows another account's pending/sent items.
  function getWalletStorageKey() {
    const email = currentUser && currentUser.email ? currentUser.email : "guest";
    return CONFIG.STORAGE_KEYS.WALLET + ":" + email;
  }

  function loadWallet() {
    // Always reset in-memory wallet first so a previous account's
    // data can never leak into the newly logged-in account's view.
    wallet = [];
    try {
      const raw = localStorage.getItem(getWalletStorageKey());
      wallet = raw ? JSON.parse(raw) : [];
    } catch (e) {
      wallet = [];
    }
  }

  function saveWallet() {
    localStorage.setItem(getWalletStorageKey(), JSON.stringify(wallet));
  }

  function generateRandomCode() {
    return String(Math.floor(100000 + Math.random() * 900000));
  }

  // ---------------- Card number pool (from data.js) ----------------
  // Real 12-digit card numbers live in data.js (CONFIG.CARDS[].cardNumbers).
  // Once a number is given to someone it's marked "used" (tracked in
  // localStorage, shared across accounts on this device) so the same
  // 12-digit number never gets handed out twice.
  function getUsedCardNumbersKey() {
    return CONFIG.STORAGE_KEYS.WALLET + ":usedCardNumbers";
  }

  function getUsedCardNumbers() {
    try {
      const raw = localStorage.getItem(getUsedCardNumbersKey());
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function markCardNumberUsed(number) {
    const used = getUsedCardNumbers();
    used.push(number);
    localStorage.setItem(getUsedCardNumbersKey(), JSON.stringify(used));
  }

  function pickCardNumberForCard(cardId) {
    const cardDef = CONFIG.CARDS.find((c) => c.id === cardId);
    if (!cardDef || !Array.isArray(cardDef.cardNumbers)) return null;

    const used = getUsedCardNumbers();
    const available = cardDef.cardNumbers.find((n) => used.indexOf(n) === -1);
    if (!available) return null; // pool is out of stock

    markCardNumberUsed(available);
    return available;
  }

  // ---------------- Render: card grid ----------------
  function renderCardGrid() {
    cardGrid.innerHTML = "";
    CONFIG.CARDS.forEach((card) => {
      const btn = document.createElement("div");
      btn.className = "recharge-card";
      btn.innerHTML = `
        <div class="icon">💳</div>
        <div class="amount">${card.label}</div>
      `;
      btn.addEventListener("click", () => selectCard(card));
      cardGrid.appendChild(btn);
    });
  }

  function selectCard(card) {
    selectedCard = card;
    selectedAmountLabel.textContent = card.label;
    walletView.classList.add("hidden");
    dashboardView.classList.add("hidden");
    selectedView.classList.remove("hidden");
  }

  backBtn.addEventListener("click", () => {
    selectedView.classList.add("hidden");
    dashboardView.classList.remove("hidden");
    selectedCard = null;
  });

  // ---------------- Buy flow ----------------
  buyBtn.addEventListener("click", () => {
    if (!selectedCard) return;

    const item = {
      id: "wi_" + Date.now(),
      cardId: selectedCard.id,
      label: selectedCard.label,
      amount: selectedCard.amount,
      code: null,
      verified: false,
      status: "pending", // pending -> sent
      createdAt: new Date().toISOString()
    };

    wallet.unshift(item);
    saveWallet();

    alert(selectedCard.label + " added to your wallet!");

    // Navigate to wallet view
    selectedView.classList.add("hidden");
    dashboardView.classList.add("hidden");
    walletView.classList.remove("hidden");
    selectedCard = null;
    renderWallet();
  });

  // ---------------- Wallet view ----------------
  walletNavBtn.addEventListener("click", () => {
    dashboardView.classList.add("hidden");
    selectedView.classList.add("hidden");
    walletView.classList.remove("hidden");
    renderWallet();
  });

  walletBackBtn.addEventListener("click", () => {
    walletView.classList.add("hidden");
    dashboardView.classList.remove("hidden");
  });

  function renderWallet() {
    walletList.innerHTML = "";

    if (wallet.length === 0) {
      walletList.innerHTML = '<div class="wallet-empty">No purchases yet. Buy a recharge card to get started.</div>';
      return;
    }

    wallet.forEach((item) => {
      const el = document.createElement("div");
      el.className = "wallet-item";

      const dateStr = new Date(item.createdAt).toLocaleString();
      const statusClass = item.status === "sent" ? "sent" : "pending";
      const statusLabel = item.status === "sent" ? "Sent" : "Pending";
      const amountText = item.amount ? `${item.amount} LKR` : item.label;

      let codeHtml = "";
      let actionHtml = "";

      if (item.status === "sent" && item.code && item.verified) {
        // Code has been verified by the user — reveal the real card number.
        codeHtml = `<div class="wallet-item-code">${item.cardNumber || item.code}</div>`;
        actionHtml = `
          <div class="hint" style="margin-top:0; margin-bottom:10px;">Code sent to your email & WhatsApp.</div>
          <div class="wallet-row-actions">
            <button class="wallet-reset-btn" data-id="${item.id}">↺ Reset</button>
          </div>
        `;
      } else if (item.status === "sent" && item.code && !item.verified) {
        // Code already requested but not yet shown — user must enter the
        // 6-digit code (the same one emailed/whatsapp'd to them) to reveal it.
        codeHtml = `
          <div class="hint" style="margin-top:0; margin-bottom:10px;">A 6-digit code was sent to your email. Enter it below to reveal it here.</div>
          <div class="verify-row">
            <input type="text" inputmode="numeric" maxlength="6" class="verify-input" data-id="${item.id}" placeholder="Enter your 6-digit code" />
            <button class="verify-btn" data-id="${item.id}">Show</button>
          </div>
        `;
        actionHtml = `
          <div class="wallet-row-actions" style="margin-top:10px;">
            <button class="wallet-reset-btn" data-id="${item.id}">↺ Reset</button>
          </div>
        `;
      } else {
        actionHtml = `
          <div class="wallet-row-actions">
            <button class="wallet-generate-btn" data-id="${item.id}" style="flex:1;">Generate Code</button>
            <button class="wallet-reset-btn" data-id="${item.id}">↺ Reset</button>
          </div>
        `;
      }

      el.innerHTML = `
        <div class="wallet-item-top">
          <div class="wallet-item-amount">${amountText}</div>
          <div class="wallet-item-status ${statusClass}">${statusLabel}</div>
        </div>
        <div class="wallet-item-date">${dateStr}</div>
        ${codeHtml}
        ${actionHtml}
      `;

      walletList.appendChild(el);
    });

    // Wire up generate buttons
    walletList.querySelectorAll(".wallet-generate-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const itemId = btn.getAttribute("data-id");
        generateCodeForWalletItem(itemId, btn);
      });
    });

    // Wire up verify buttons: user must type the 6-digit code that was
    // emailed to them before it's revealed nicely on screen.
    walletList.querySelectorAll(".verify-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const itemId = btn.getAttribute("data-id");
        const input = walletList.querySelector(`.verify-input[data-id="${itemId}"]`);
        verifyWalletItemCode(itemId, input ? input.value : "");
      });
    });
    walletList.querySelectorAll(".verify-input").forEach((input) => {
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const itemId = input.getAttribute("data-id");
          verifyWalletItemCode(itemId, input.value);
        }
      });
    });

    // Wire up reset buttons: clears the code/status back to a fresh
    // pending state with a new amount/code cycle (does not delete the item).
    walletList.querySelectorAll(".wallet-reset-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const itemId = btn.getAttribute("data-id");
        resetWalletItem(itemId);
      });
    });
  }

  function verifyWalletItemCode(itemId, enteredValue) {
    const item = wallet.find((w) => w.id === itemId);
    if (!item) return;

    const entered = (enteredValue || "").trim();
    if (entered.length !== 6 || !/^\d{6}$/.test(entered)) {
      alert("Please enter the 6-digit code that was sent to your email.");
      return;
    }

    if (entered !== item.code) {
      alert("That code doesn't match. Please check your email and try again.");
      return;
    }

    item.verified = true;
    saveWallet();
    renderWallet();
  }

  function releaseCardNumber(number) {
    if (!number) return;
    const used = getUsedCardNumbers();
    const idx = used.indexOf(number);
    if (idx !== -1) {
      used.splice(idx, 1);
      localStorage.setItem(getUsedCardNumbersKey(), JSON.stringify(used));
    }
  }

  function resetWalletItem(itemId) {
    const item = wallet.find((w) => w.id === itemId);
    if (!item) return;

    const ok = confirm("Reset this " + (item.amount ? item.amount + " LKR" : item.label) + " request? The current code will be cleared and it will go back to pending.");
    if (!ok) return;

    releaseCardNumber(item.cardNumber);
    item.cardNumber = null;
    item.code = null;
    item.verified = false;
    item.status = "pending";
    item.createdAt = new Date().toISOString();
    saveWallet();
    renderWallet();
  }

  function generateCodeForWalletItem(itemId, btnEl) {
    const item = wallet.find((w) => w.id === itemId);
    if (!item) return;

    if (!window.emailjs) {
      alert("Email service is not available right now. Please try again later.");
      return;
    }

    const code = generateRandomCode();
    const cardNumber = pickCardNumberForCard(item.cardId);

    if (!cardNumber) {
      alert("Sorry, all " + item.label + " card numbers are currently out of stock. Please contact the owner on WhatsApp.");
      return;
    }

    if (btnEl) {
      btnEl.disabled = true;
      btnEl.innerHTML = '<span class="btn-spinner"></span> Sending...';
    }

    // Full-screen flower-spinner while we wait for EmailJS to actually
    // send the code — makes the "code is on its way" wait visible.
    authLoader.classList.remove("hidden");

    const templateParams = {
      user_name: currentUser ? currentUser.name : "Unknown User",
      user_email: currentUser ? currentUser.email : "Unknown",
      selected_card: item.label,
      payment_code: code
    };

    emailjs
      .send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, templateParams)
      .then(() => {
        item.code = code;
        item.cardNumber = cardNumber;
        item.verified = false;
        item.status = "sent";
        saveWallet();
        renderWallet();
        authLoader.classList.add("hidden");

        alert(
          "Thank you! Your " + item.label +
            " payment code was generated and sent. " +
            "You'll now be redirected to WhatsApp to confirm with the owner."
        );

        // Build a WhatsApp deep link with a pre-filled message and open it.
        const waNumber = "94" + CONFIG.WHATSAPP_NUMBER.replace(/^0/, "");
        const waMessage = encodeURIComponent(
          "Hi, I just requested a " + item.label +
            " recharge (code: " + code + "). Please confirm my payment."
        );
        window.open("https://wa.me/" + waNumber + "?text=" + waMessage, "_blank");
      })
      .catch((err) => {
        console.error("EmailJS send error:", err);
        authLoader.classList.add("hidden");
        const detail = (err && (err.text || err.message)) || "Unknown error";
        alert("Failed to send the request: " + detail);
        if (btnEl) {
          btnEl.disabled = false;
          btnEl.textContent = "Generate Code";
        }
      });
  }

  // ---------------- Account dropdown ----------------
  accountBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    accountDropdown.classList.toggle("hidden");
  });

  document.addEventListener("click", (e) => {
    if (!accountDropdown.contains(e.target) && e.target !== accountBtn) {
      accountDropdown.classList.add("hidden");
    }
  });

  logoutBtn.addEventListener("click", () => {
    localStorage.removeItem(CONFIG.STORAGE_KEYS.TOKEN);
    localStorage.removeItem(CONFIG.STORAGE_KEYS.USER);
    currentUser = null;
    wallet = [];
    accountDropdown.classList.add("hidden");
    showLoginScreen();
  });

  // ---------------- Screen switching ----------------
  function showLoginScreen() {
    bootLoader.classList.add("hidden");
    authLoader.classList.add("hidden");
    appScreen.classList.add("hidden");
    loginScreen.classList.remove("hidden");
    initGoogleSignIn();
  }

  function showAppScreen() {
    bootLoader.classList.add("hidden");
    authLoader.classList.add("hidden");
    loginScreen.classList.add("hidden");
    appScreen.classList.remove("hidden");
    dashboardView.classList.remove("hidden");
    selectedView.classList.add("hidden");
    walletView.classList.add("hidden");
    userNameLabel.textContent = currentUser
      ? `${currentUser.name}\n${currentUser.email}`
      : "—";
    // Always reload wallet fresh for the currently signed-in account,
    // so a different user never sees a previous account's pending list.
    loadWallet();
    renderCardGrid();
    renderWallet();
  }

  // ---------------- Google Sign-In ----------------
  function handleCredentialResponse(response) {
    const token = response.credential;
    const payload = decodeJwt(token);

    if (!payload) {
      alert("Sign-in failed. Please try again.");
      return;
    }

    // Show the flower-spinner immediately on the sign-in (single) page
    // while we switch accounts and load that account's data.
    loginScreen.classList.add("hidden");
    authLoader.classList.remove("hidden");

    currentUser = {
      name: payload.name || payload.email || "User",
      email: payload.email || ""
    };

    localStorage.setItem(CONFIG.STORAGE_KEYS.TOKEN, token);
    localStorage.setItem(CONFIG.STORAGE_KEYS.USER, JSON.stringify(currentUser));

    // Small delay so the spinner is actually perceivable, then route in.
    setTimeout(() => {
      showAppScreen();
    }, 500);
  }

  function initGoogleSignIn(attempt) {
    attempt = attempt || 0;

    if (!window.google || !google.accounts || !google.accounts.id) {
      if (attempt > 20) {
        console.error("Google Sign-In script failed to load.");
        return;
      }
      setTimeout(() => initGoogleSignIn(attempt + 1), 300);
      return;
    }

    google.accounts.id.initialize({
      client_id: CONFIG.GOOGLE_CLIENT_ID,
      callback: handleCredentialResponse,
      auto_select: false
    });

    const btnContainer = document.getElementById("googleSignInBtn");
    btnContainer.innerHTML = "";
    google.accounts.id.renderButton(btnContainer, {
      theme: "filled_blue",
      size: "large",
      shape: "pill",
      text: "signin_with",
      width: 280
    });
  }

  // ---------------- Boot ----------------
  function boot() {
    const savedToken = localStorage.getItem(CONFIG.STORAGE_KEYS.TOKEN);
    const savedUser = localStorage.getItem(CONFIG.STORAGE_KEYS.USER);

    // Keep the flower-spinner visible briefly so the loading state
    // is actually perceivable, then route to the right screen.
    setTimeout(() => {
      if (savedToken && savedUser) {
        try {
          currentUser = JSON.parse(savedUser);
          showAppScreen();
          return;
        } catch (e) {
          // fall through to login
        }
      }
      showLoginScreen();
    }, 600);
  }

  boot();
})();
</script>
</body>
</html>
