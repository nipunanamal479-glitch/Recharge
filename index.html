<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Digital Recharge</title>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="data.js"></script>

<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-glass: rgba(30, 41, 59, 0.7);
    --border: rgba(148, 163, 184, 0.15);
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --danger: #ef4444;
    --danger-hover: #dc2626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(59,130,246,0.15), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(99,102,241,0.12), transparent 40%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
  }

  .hidden { display: none !important; }

  /* ---------- Login Screen ---------- */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    background: var(--panel-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .login-card .logo {
    font-size: 40px;
    margin-bottom: 8px;
  }

  .login-card h1 {
    font-size: 22px;
    margin-bottom: 6px;
  }

  .login-card p {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 28px;
  }

  #googleSignInBtn {
    display: flex;
    justify-content: center;
    min-height: 4px;
  }

  /* ---------- App Shell ---------- */
  #appScreen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--panel-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  header h2 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .account-wrap {
    position: relative;
  }

  #accountBtn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #accountBtn:hover { background: #273449; }

  #accountDropdown {
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    min-width: 180px;
    padding: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 60;
  }

  #accountDropdown .user-name {
    font-size: 13px;
    color: var(--text-dim);
    padding: 4px 8px 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    word-break: break-word;
  }

  #logoutBtn {
    width: 100%;
    background: var(--danger);
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  #logoutBtn:hover { background: var(--danger-hover); }

  main {
    flex: 1;
    padding: 24px 16px 60px;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  .panel {
    background: var(--panel-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }

  .panel h3 {
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 16px;
    text-align: center;
    font-weight: 500;
  }

  /* ---------- Card Grid ---------- */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .recharge-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }

  .recharge-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    background: #243348;
  }

  .recharge-card .icon {
    font-size: 26px;
    margin-bottom: 8px;
  }

  .recharge-card .amount {
    font-size: 15px;
    font-weight: 700;
  }

  /* ---------- Selected Card Screen ---------- */
  #selectedView .panel {
    text-align: center;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { color: var(--text); }

  .selected-amount-display {
    background: linear-gradient(135deg, var(--accent), #6366f1);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .selected-amount-display .label {
    font-size: 13px;
    opacity: 0.85;
    margin-bottom: 6px;
  }

  .selected-amount-display .value {
    font-size: 32px;
    font-weight: 800;
  }

  #generateCodeBtn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  #generateCodeBtn:hover { background: var(--accent-hover); }
  #generateCodeBtn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .hint {
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--text-dim);
  }

  .generated-code-box {
    margin-top: 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }

  .generated-code-box .label {
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .generated-code-box .value {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 4px;
    color: #4ade80;
  }

  @media (max-width: 380px) {
    .recharge-card .amount { font-size: 13px; }
    .selected-amount-display .value { font-size: 26px; }
  }

  /* ---------- Buy button (selected card view) ---------- */
  #buyBtn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  #buyBtn:hover { background: var(--accent-hover); }
  #buyBtn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ---------- Wallet nav button ---------- */
  #walletNavBtn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
  }
  #walletNavBtn:hover { background: #273449; }

  /* ---------- Wallet View ---------- */
  .wallet-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .wallet-item:last-child { margin-bottom: 0; }

  .wallet-item-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .wallet-item-amount {
    font-size: 17px;
    font-weight: 700;
  }

  .wallet-item-status {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .wallet-item-status.pending {
    background: rgba(251, 191, 36, 0.15);
    color: #fbbf24;
  }

  .wallet-item-status.sent {
    background: rgba(74, 222, 128, 0.15);
    color: #4ade80;
  }

  .wallet-item-date {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .wallet-item-code {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #4ade80;
    margin-bottom: 8px;
  }

  .wallet-generate-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
  }
  .wallet-generate-btn:hover { background: var(--accent-hover); }
  .wallet-generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .wallet-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    padding: 30px 10px;
  }
</style>
</head>
<body>

  <!-- ================= LOGIN SCREEN ================= -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="logo">⚡</div>
      <h1>Digital Recharge</h1>
      <p>Sign in to continue to your dashboard</p>
      <div id="googleSignInBtn"></div>
    </div>
  </div>

  <!-- ================= APP SCREEN ================= -->
  <div id="appScreen" class="hidden">
    <header>
      <h2>Digital Recharge</h2>
      <div style="display:flex; align-items:center; gap:8px;">
        <button id="walletNavBtn">🛒 Wallet</button>
        <div class="account-wrap">
          <button id="accountBtn">👤 Account ▾</button>
          <div id="accountDropdown" class="hidden">
            <div class="user-name" id="userNameLabel">—</div>
            <button id="logoutBtn">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="container">

        <!-- ---- Dashboard view: card grid ---- -->
        <div id="dashboardView">
          <div class="panel">
            <h3>Select a recharge amount</h3>
            <div class="card-grid" id="cardGrid"></div>
          </div>
        </div>

        <!-- ---- Selected card view ---- -->
        <div id="selectedView" class="hidden">
          <button class="back-btn" id="backBtn">← Back</button>
          <div class="panel">
            <div class="selected-amount-display">
              <div class="label">Selected Card</div>
              <div class="value" id="selectedAmountLabel">—</div>
            </div>
            <button id="buyBtn">Buy Now</button>
            <p class="hint">This will be added to your wallet. You can generate the payment code from there.</p>
          </div>
        </div>

        <!-- ---- Wallet view ---- -->
        <div id="walletView" class="hidden">
          <button class="back-btn" id="walletBackBtn">← Back</button>
          <div class="panel">
            <h3>My Wallet</h3>
            <div id="walletList"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

<script>
(function () {
  "use strict";

  // ---------------- State ----------------
  let currentUser = null;     // { name, email }
  let selectedCard = null;    // CONFIG.CARDS item
  let wallet = [];            // [{ id, cardId, label, code, status, createdAt }]

  // ---------------- DOM refs ----------------
  const loginScreen = document.getElementById("loginScreen");
  const appScreen = document.getElementById("appScreen");
  const accountBtn = document.getElementById("accountBtn");
  const accountDropdown = document.getElementById("accountDropdown");
  const logoutBtn = document.getElementById("logoutBtn");
  const userNameLabel = document.getElementById("userNameLabel");
  const walletNavBtn = document.getElementById("walletNavBtn");

  const dashboardView = document.getElementById("dashboardView");
  const selectedView = document.getElementById("selectedView");
  const walletView = document.getElementById("walletView");
  const cardGrid = document.getElementById("cardGrid");
  const selectedAmountLabel = document.getElementById("selectedAmountLabel");
  const buyBtn = document.getElementById("buyBtn");
  const backBtn = document.getElementById("backBtn");
  const walletBackBtn = document.getElementById("walletBackBtn");
  const walletList = document.getElementById("walletList");

  // ---------------- Init EmailJS ----------------
  if (window.emailjs) {
    emailjs.init({ publicKey: CONFIG.EMAILJS_PUBLIC_KEY });
  }

  // ---------------- Utility: JWT decode ----------------
  function decodeJwt(token) {
    try {
      const base64Url = token.split(".")[1];
      const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
      const jsonPayload = decodeURIComponent(
        atob(base64)
          .split("")
          .map((c) => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2))
          .join("")
      );
      return JSON.parse(jsonPayload);
    } catch (e) {
      console.error("Failed to decode JWT:", e);
      return null;
    }
  }

  // ---------------- Wallet storage helpers ----------------
  function loadWallet() {
    try {
      const raw = localStorage.getItem(CONFIG.STORAGE_KEYS.WALLET);
      wallet = raw ? JSON.parse(raw) : [];
    } catch (e) {
      wallet = [];
    }
  }

  function saveWallet() {
    localStorage.setItem(CONFIG.STORAGE_KEYS.WALLET, JSON.stringify(wallet));
  }

  function generateRandomCode() {
    return String(Math.floor(100000 + Math.random() * 900000));
  }

  // ---------------- Render: card grid ----------------
  function renderCardGrid() {
    cardGrid.innerHTML = "";
    CONFIG.CARDS.forEach((card) => {
      const btn = document.createElement("div");
      btn.className = "recharge-card";
      btn.innerHTML = `
        <div class="icon">💳</div>
        <div class="amount">${card.label}</div>
      `;
      btn.addEventListener("click", () => selectCard(card));
      cardGrid.appendChild(btn);
    });
  }

  function selectCard(card) {
    selectedCard = card;
    selectedAmountLabel.textContent = card.label;
    walletView.classList.add("hidden");
    dashboardView.classList.add("hidden");
    selectedView.classList.remove("hidden");
  }

  backBtn.addEventListener("click", () => {
    selectedView.classList.add("hidden");
    dashboardView.classList.remove("hidden");
    selectedCard = null;
  });

  // ---------------- Buy flow ----------------
  buyBtn.addEventListener("click", () => {
    if (!selectedCard) return;

    const item = {
      id: "wi_" + Date.now(),
      cardId: selectedCard.id,
      label: selectedCard.label,
      code: null,
      status: "pending", // pending -> sent
      createdAt: new Date().toISOString()
    };

    wallet.unshift(item);
    saveWallet();

    alert(selectedCard.label + " added to your wallet!");

    // Navigate to wallet view
    selectedView.classList.add("hidden");
    dashboardView.classList.add("hidden");
    walletView.classList.remove("hidden");
    selectedCard = null;
    renderWallet();
  });

  // ---------------- Wallet view ----------------
  walletNavBtn.addEventListener("click", () => {
    dashboardView.classList.add("hidden");
    selectedView.classList.add("hidden");
    walletView.classList.remove("hidden");
    renderWallet();
  });

  walletBackBtn.addEventListener("click", () => {
    walletView.classList.add("hidden");
    dashboardView.classList.remove("hidden");
  });

  function renderWallet() {
    walletList.innerHTML = "";

    if (wallet.length === 0) {
      walletList.innerHTML = '<div class="wallet-empty">No purchases yet. Buy a recharge card to get started.</div>';
      return;
    }

    wallet.forEach((item) => {
      const el = document.createElement("div");
      el.className = "wallet-item";

      const dateStr = new Date(item.createdAt).toLocaleString();
      const statusClass = item.status === "sent" ? "sent" : "pending";
      const statusLabel = item.status === "sent" ? "Sent" : "Pending";

      let codeHtml = "";
      let actionHtml = "";

      if (item.status === "sent" && item.code) {
        codeHtml = `<div class="wallet-item-code">${item.code}</div>`;
        actionHtml = `<div class="hint" style="margin-top:0;">Code sent to owner via email & WhatsApp.</div>`;
      } else {
        actionHtml = `<button class="wallet-generate-btn" data-id="${item.id}">Generate Code</button>`;
      }

      el.innerHTML = `
        <div class="wallet-item-top">
          <div class="wallet-item-amount">${item.label}</div>
          <div class="wallet-item-status ${statusClass}">${statusLabel}</div>
        </div>
        <div class="wallet-item-date">${dateStr}</div>
        ${codeHtml}
        ${actionHtml}
      `;

      walletList.appendChild(el);
    });

    // Wire up generate buttons
    walletList.querySelectorAll(".wallet-generate-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const itemId = btn.getAttribute("data-id");
        generateCodeForWalletItem(itemId, btn);
      });
    });
  }

  function generateCodeForWalletItem(itemId, btnEl) {
    const item = wallet.find((w) => w.id === itemId);
    if (!item) return;

    if (!window.emailjs) {
      alert("Email service is not available right now. Please try again later.");
      return;
    }

    const code = generateRandomCode();

    if (btnEl) {
      btnEl.disabled = true;
      btnEl.textContent = "Sending...";
    }

    const templateParams = {
      user_name: currentUser ? currentUser.name : "Unknown User",
      user_email: currentUser ? currentUser.email : "Unknown",
      selected_card: item.label,
      payment_code: code
    };

    emailjs
      .send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, templateParams)
      .then(() => {
        item.code = code;
        item.status = "sent";
        saveWallet();
        renderWallet();

        alert(
          "Thank you! Your " + item.label +
            " payment code was generated and sent. " +
            "You'll now be redirected to WhatsApp to confirm with the owner."
        );

        // Build a WhatsApp deep link with a pre-filled message and open it.
        const waNumber = "94" + CONFIG.WHATSAPP_NUMBER.replace(/^0/, "");
        const waMessage = encodeURIComponent(
          "Hi, I just requested a " + item.label +
            " recharge (code: " + code + "). Please confirm my payment."
        );
        window.open("https://wa.me/" + waNumber + "?text=" + waMessage, "_blank");
      })
      .catch((err) => {
        console.error("EmailJS send error:", err);
        const detail = (err && (err.text || err.message)) || "Unknown error";
        alert("Failed to send the request: " + detail);
        if (btnEl) {
          btnEl.disabled = false;
          btnEl.textContent = "Generate Code";
        }
      });
  }

  // ---------------- Account dropdown ----------------
  accountBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    accountDropdown.classList.toggle("hidden");
  });

  document.addEventListener("click", (e) => {
    if (!accountDropdown.contains(e.target) && e.target !== accountBtn) {
      accountDropdown.classList.add("hidden");
    }
  });

  logoutBtn.addEventListener("click", () => {
    localStorage.removeItem(CONFIG.STORAGE_KEYS.TOKEN);
    localStorage.removeItem(CONFIG.STORAGE_KEYS.USER);
    currentUser = null;
    accountDropdown.classList.add("hidden");
    showLoginScreen();
  });

  // ---------------- Screen switching ----------------
  function showLoginScreen() {
    appScreen.classList.add("hidden");
    loginScreen.classList.remove("hidden");
    initGoogleSignIn();
  }

  function showAppScreen() {
    loginScreen.classList.add("hidden");
    appScreen.classList.remove("hidden");
    dashboardView.classList.remove("hidden");
    selectedView.classList.add("hidden");
    walletView.classList.add("hidden");
    userNameLabel.textContent = currentUser
      ? `${currentUser.name}\n${currentUser.email}`
      : "—";
    loadWallet();
    renderCardGrid();
  }

  // ---------------- Google Sign-In ----------------
  function handleCredentialResponse(response) {
    const token = response.credential;
    const payload = decodeJwt(token);

    if (!payload) {
      alert("Sign-in failed. Please try again.");
      return;
    }

    currentUser = {
      name: payload.name || payload.email || "User",
      email: payload.email || ""
    };

    localStorage.setItem(CONFIG.STORAGE_KEYS.TOKEN, token);
    localStorage.setItem(CONFIG.STORAGE_KEYS.USER, JSON.stringify(currentUser));

    showAppScreen();
  }

  function initGoogleSignIn(attempt) {
    attempt = attempt || 0;

    if (!window.google || !google.accounts || !google.accounts.id) {
      if (attempt > 20) {
        console.error("Google Sign-In script failed to load.");
        return;
      }
      setTimeout(() => initGoogleSignIn(attempt + 1), 300);
      return;
    }

    google.accounts.id.initialize({
      client_id: CONFIG.GOOGLE_CLIENT_ID,
      callback: handleCredentialResponse,
      auto_select: false
    });

    const btnContainer = document.getElementById("googleSignInBtn");
    btnContainer.innerHTML = "";
    google.accounts.id.renderButton(btnContainer, {
      theme: "filled_blue",
      size: "large",
      shape: "pill",
      text: "signin_with",
      width: 280
    });
  }

  // ---------------- Boot ----------------
  function boot() {
    const savedToken = localStorage.getItem(CONFIG.STORAGE_KEYS.TOKEN);
    const savedUser = localStorage.getItem(CONFIG.STORAGE_KEYS.USER);

    if (savedToken && savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
        showAppScreen();
        return;
      } catch (e) {
        // fall through to login
      }
    }

    showLoginScreen();
  }

  boot();
})();
</script>
</body>
</html>
