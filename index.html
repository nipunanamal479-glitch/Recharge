<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Digital Recharge</title>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="data.js"></script>

<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-glass: rgba(30, 41, 59, 0.7);
    --border: rgba(148, 163, 184, 0.15);
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --danger: #ef4444;
    --danger-hover: #dc2626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(59,130,246,0.15), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(99,102,241,0.12), transparent 40%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
  }

  .hidden { display: none !important; }

  /* ---------- Login Screen ---------- */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    background: var(--panel-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .login-card .logo {
    font-size: 40px;
    margin-bottom: 8px;
  }

  .login-card h1 {
    font-size: 22px;
    margin-bottom: 6px;
  }

  .login-card p {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 28px;
  }

  #googleSignInBtn.google-btn-fake {
    width: 100%;
    height: 44px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #fff;
    color: #1f2430;
    font-size: 14.5px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  #googleSignInBtn.google-btn-fake:hover { background: #f1f3f5; }
  #googleSignInBtn.google-btn-fake:disabled { opacity: 0.6; cursor: not-allowed; }

  .auth-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 16px;
    color: var(--text-dim);
    font-size: 12.5px;
  }
  .auth-divider::before, .auth-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .auth-input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 10px;
    outline: none;
  }
  .auth-input:focus { border-color: var(--accent); }

  .auth-error {
    color: var(--danger);
    font-size: 12.5px;
    text-align: left;
    margin-bottom: 10px;
  }

  .auth-primary-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .auth-primary-btn:hover { background: var(--accent-hover); }

  .auth-secondary-btn {
    width: 100%;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 11px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .auth-secondary-btn:hover { color: var(--text); border-color: var(--accent); }

  /* ---------- App Shell ---------- */
  #appScreen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--panel-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  header h2 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .account-wrap {
    position: relative;
  }

  #accountBtn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #accountBtn:hover { background: #273449; }

  #accountDropdown {
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    min-width: 180px;
    padding: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 60;
  }

  #accountDropdown .user-name {
    font-size: 13px;
    color: var(--text-dim);
    padding: 4px 8px 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    word-break: break-word;
    white-space: pre-line;
  }

  #logoutBtn {
    width: 100%;
    background: var(--danger);
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  #logoutBtn:hover { background: var(--danger-hover); }

  main {
    flex: 1;
    padding: 24px 16px 60px;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  .panel {
    background: var(--panel-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }

  .panel h3 {
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 16px;
    text-align: center;
    font-weight: 500;
  }

  /* ---------- Card Grid ---------- */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .recharge-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }

  .recharge-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    background: #243348;
  }

  .recharge-card .icon {
    font-size: 26px;
    margin-bottom: 8px;
  }

  .recharge-card .amount {
    font-size: 15px;
    font-weight: 700;
  }

  /* ---------- Selected Card Screen ---------- */
  #selectedView .panel {
    text-align: center;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { color: var(--text); }

  .selected-amount-display {
    background: linear-gradient(135deg, var(--accent), #6366f1);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .selected-amount-display .label {
    font-size: 13px;
    opacity: 0.85;
    margin-bottom: 6px;
  }

  .selected-amount-display .value {
    font-size: 32px;
    font-weight: 800;
  }

  #generateCodeBtn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  #generateCodeBtn:hover { background: var(--accent-hover); }
  #generateCodeBtn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .hint {
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--text-dim);
  }

  .generated-code-box {
    margin-top: 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }

  .generated-code-box .label {
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .generated-code-box .value {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 4px;
    color: #4ade80;
  }

  @media (max-width: 380px) {
    .recharge-card .amount { font-size: 13px; }
    .selected-amount-display .value { font-size: 26px; }
  }

  /* ---------- Buy button (selected card view) ---------- */
  #buyBtn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  #buyBtn:hover { background: var(--accent-hover); }
  #buyBtn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ---------- Wallet nav button ---------- */
  #walletNavBtn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
  }
  #walletNavBtn:hover { background: #273449; }

  /* ---------- Wallet View ---------- */
  .wallet-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .wallet-item:last-child { margin-bottom: 0; }

  .wallet-item-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .wallet-item-amount {
    font-size: 17px;
    font-weight: 700;
  }

  .wallet-item-status {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .wallet-item-status.pending {
    background: rgba(251, 191, 36, 0.15);
    color: #fbbf24;
  }

  .wallet-item-status.sent {
    background: rgba(74, 222, 128, 0.15);
    color: #4ade80;
  }

  .wallet-item-date {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .wallet-item-code-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 22px 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .wallet-item-code {
    position: relative;
    z-index: 2;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #4ade80;
    text-shadow: 0 0 18px rgba(74, 222, 128, 0.6);
    animation: code-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes code-pop {
    0%   { transform: scale(0.2); opacity: 0; }
    55%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  .burst-ring {
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,222,128,0.9), rgba(59,130,246,0.6) 60%, transparent 70%);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(0);
    animation: burst-expand 0.7s ease-out forwards;
    z-index: 1;
  }

  @keyframes burst-expand {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
    100% { transform: translate(-50%, -50%) scale(9); opacity: 0; }
  }

  .burst-spark {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    left: 50%;
    top: 50%;
    z-index: 1;
    animation: spark-fly 0.7s ease-out forwards;
  }

  @keyframes spark-fly {
    0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -50%) translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  .wallet-generate-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .wallet-generate-btn:hover { background: var(--accent-hover); }
  .wallet-generate-btn:disabled { opacity: 0.85; cursor: not-allowed; }

  .wallet-row-actions {
    display: flex;
    gap: 8px;
  }

  .verify-row {
    display: flex;
    gap: 8px;
  }

  .verify-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 14px;
    letter-spacing: 2px;
    outline: none;
  }
  .verify-input:focus { border-color: var(--accent); }

  .verify-btn {
    flex: 0 0 auto;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
  }
  .verify-btn:hover { background: var(--accent-hover); }

  .wallet-reset-btn {
    flex: 0 0 auto;
    background: var(--panel-glass);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .wallet-reset-btn:hover { color: var(--text); border-color: var(--danger); }

  .wallet-delete-btn {
    flex: 0 0 auto;
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.35);
    color: var(--danger);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .wallet-delete-btn:hover { background: var(--danger); color: #fff; }

  .wallet-contact-btn {
    width: 100%;
    background: #25d366;
    color: #06280f;
    border: none;
    padding: 11px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
  }
  .wallet-contact-btn:hover { background: #1ebe5a; }

  .btn-spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: btn-spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes btn-spin {
    to { transform: rotate(360deg); }
  }

  .wallet-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    padding: 30px 10px;
  }

  /* ---------- Boot Loader ---------- */
  #bootLoader {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flower-spinner {
    position: relative;
    width: 56px;
    height: 56px;
  }

  .flower-spinner .petal {
    position: absolute;
    top: 0;
    left: 50%;
    width: 8px;
    height: 20px;
    margin-left: -4px;
    border-radius: 4px;
    background: var(--accent);
    transform-origin: 4px 28px;
    animation: petal-fade 1s linear infinite;
  }

  .flower-spinner .petal:nth-child(1) { transform: rotate(0deg);   animation-delay: -0.875s; }
  .flower-spinner .petal:nth-child(2) { transform: rotate(45deg);  animation-delay: -0.75s; }
  .flower-spinner .petal:nth-child(3) { transform: rotate(90deg);  animation-delay: -0.625s; }
  .flower-spinner .petal:nth-child(4) { transform: rotate(135deg); animation-delay: -0.5s; }
  .flower-spinner .petal:nth-child(5) { transform: rotate(180deg); animation-delay: -0.375s; }
  .flower-spinner .petal:nth-child(6) { transform: rotate(225deg); animation-delay: -0.25s; }
  .flower-spinner .petal:nth-child(7) { transform: rotate(270deg); animation-delay: -0.125s; }
  .flower-spinner .petal:nth-child(8) { transform: rotate(315deg); animation-delay: 0s; }

  @keyframes petal-fade {
    0%   { opacity: 1; }
    100% { opacity: 0.15; }
  }

  /* Small inline spinner used inside buttons */
  .btn-spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: btn-spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes btn-spin {
    to { transform: rotate(360deg); }
  }

  /* Full-screen overlay spinner (shown while switching accounts) */
  #authLoader {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }
</style>
</head>
<body>

  <!-- ================= BOOT LOADER ================= -->
  <div id="bootLoader">
    <div class="flower-spinner">
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
    </div>
  </div>

  <!-- ================= AUTH SWITCH LOADER (shown briefly when signing in) ================= -->
  <div id="authLoader" class="hidden">
    <div class="flower-spinner">
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
    </div>
  </div>

  <!-- ================= LOGIN SCREEN ================= -->
  <div id="loginScreen" class="hidden">
    <div class="login-card">
      <div class="logo">⚡</div>
      <h1>Digital Recharge</h1>
      <p>Sign in to continue to your dashboard</p>

      <button type="button" class="google-btn-fake" id="googleSignInBtn" style="position:static;">
        <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right:8px;"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.71A5.4 5.4 0 0 1 3.69 9c0-.59.1-1.17.28-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.59-2.59C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.96l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>or</span></div>

      <!-- Email / password sign-in, backed by Firebase Authentication -->
      <form id="emailAuthForm" autocomplete="off">
        <input type="email" id="authEmail" class="auth-input" placeholder="Email" required />
        <input type="password" id="authPassword" class="auth-input" placeholder="Password" required minlength="6" />
        <div id="authError" class="auth-error hidden"></div>
        <button type="submit" id="authSignInBtn" class="auth-primary-btn">Sign In</button>
        <button type="button" id="authCreateBtn" class="auth-secondary-btn">Create an Account</button>
      </form>
      <p class="hint" style="margin-top:14px;">Secured by Firebase Authentication — works from any device.</p>
    </div>
  </div>

  <!-- ================= APP SCREEN ================= -->
  <div id="appScreen" class="hidden">
    <header>
      <h2>Digital Recharge</h2>
      <div style="display:flex; align-items:center; gap:8px;">
        <button id="walletNavBtn">🛒 Wallet</button>
        <div class="account-wrap">
          <button id="accountBtn">👤 Account ▾</button>
          <div id="accountDropdown" class="hidden">
            <div class="user-name" id="userNameLabel">—</div>
            <button id="logoutBtn">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="container">

        <!-- ---- Dashboard view: card grid ---- -->
        <div id="dashboardView">
          <div class="panel">
            <h3>Select a recharge amount</h3>
            <div class="card-grid" id="cardGrid"></div>
          </div>
        </div>

        <!-- ---- Selected card view ---- -->
        <div id="selectedView" class="hidden">
          <button class="back-btn" id="backBtn">← Back</button>
          <div class="panel">
            <div class="selected-amount-display">
              <div class="label">Selected Card</div>
              <div class="value" id="selectedAmountLabel">—</div>
            </div>
            <button id="buyBtn">Buy Now</button>
            <p class="hint">This will be added to your wallet. You can generate the payment code from there.</p>
          </div>
        </div>

        <!-- ---- Wallet view ---- -->
        <div id="walletView" class="hidden">
          <button class="back-btn" id="walletBackBtn">← Back</button>
          <div class="panel">
            <h3>My Wallet</h3>
            <div id="walletList"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

<script type="module">
  // ==========================================================
  // Firebase setup (Auth + Firestore) — free Spark plan project
  // ==========================================================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup,
    createUserWithEmailAndPassword, signInWithEmailAndPassword,
    onAuthStateChanged, signOut, updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA0bGI0PErs56jTIjW_3P4-2bgwEIRfBTI",
    authDomain: "recharge-card-79265.firebaseapp.com",
    projectId: "recharge-card-79265",
    storageBucket: "recharge-card-79265.firebasestorage.app",
    messagingSenderId: "619828501430",
    appId: "1:619828501430:web:0ac8da4d3d7ce0d020bf17",
    measurementId: "G-093TL9ZJYK"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  (function () {
    "use strict";

    // ---------------- State ----------------
    let currentUser = null;     // { uid, name, email }
    let selectedCard = null;    // CONFIG.CARDS item
    let wallet = [];            // [{ id, cardId, label, amount, code, cardNumber, verified, status, createdAt }]

    // ---------------- DOM refs ----------------
    const bootLoader = document.getElementById("bootLoader");
    const authLoader = document.getElementById("authLoader");
    const loginScreen = document.getElementById("loginScreen");
    const appScreen = document.getElementById("appScreen");
    const accountBtn = document.getElementById("accountBtn");
    const accountDropdown = document.getElementById("accountDropdown");
    const logoutBtn = document.getElementById("logoutBtn");
    const userNameLabel = document.getElementById("userNameLabel");
    const walletNavBtn = document.getElementById("walletNavBtn");

    const dashboardView = document.getElementById("dashboardView");
    const selectedView = document.getElementById("selectedView");
    const walletView = document.getElementById("walletView");
    const cardGrid = document.getElementById("cardGrid");
    const selectedAmountLabel = document.getElementById("selectedAmountLabel");
    const buyBtn = document.getElementById("buyBtn");
    const backBtn = document.getElementById("backBtn");
    const walletBackBtn = document.getElementById("walletBackBtn");
    const walletList = document.getElementById("walletList");

    const googleSignInBtn = document.getElementById("googleSignInBtn");
    const emailAuthForm = document.getElementById("emailAuthForm");
    const authEmail = document.getElementById("authEmail");
    const authPassword = document.getElementById("authPassword");
    const authError = document.getElementById("authError");
    const authSignInBtn = document.getElementById("authSignInBtn");
    const authCreateBtn = document.getElementById("authCreateBtn");

    // ---------------- Init EmailJS (still used to email the 6-digit OTP) ----------------
    if (window.emailjs) {
      emailjs.init({ publicKey: CONFIG.EMAILJS_PUBLIC_KEY });
    }

    // ---------------- Auth error helpers ----------------
    function showAuthError(message) {
      authError.textContent = message;
      authError.classList.remove("hidden");
    }
    function clearAuthError() {
      authError.textContent = "";
      authError.classList.add("hidden");
    }
    function friendlyAuthError(err) {
      const code = err && err.code ? err.code : "";
      if (code === "auth/email-already-in-use") return "An account with this email already exists. Tap \"Sign In\" instead.";
      if (code === "auth/invalid-email") return "Please enter a valid email address.";
      if (code === "auth/weak-password") return "Password should be at least 6 characters.";
      if (code === "auth/user-not-found" || code === "auth/invalid-credential") return "No account found, or the password is incorrect.";
      if (code === "auth/wrong-password") return "Incorrect password. Please try again.";
      if (code === "auth/popup-closed-by-user") return "Google sign-in was cancelled.";
      return (err && err.message) || "Something went wrong. Please try again.";
    }

    // ---------------- Google sign-in ----------------
    googleSignInBtn.addEventListener("click", async () => {
      clearAuthError();
      googleSignInBtn.disabled = true;
      try {
        await signInWithPopup(auth, googleProvider);
        // onAuthStateChanged will take it from here.
      } catch (err) {
        console.error("Google sign-in error:", err);
        showAuthError(friendlyAuthError(err));
      } finally {
        googleSignInBtn.disabled = false;
      }
    });

    // ---------------- Email / password sign-in (Firebase Auth) ----------------
    emailAuthForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearAuthError();

      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) return;

      authSignInBtn.disabled = true;
      authSignInBtn.innerHTML = '<span class="btn-spinner"></span> Signing in...';
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        console.error("Email sign-in error:", err);
        showAuthError(friendlyAuthError(err));
      } finally {
        authSignInBtn.disabled = false;
        authSignInBtn.textContent = "Sign In";
      }
    });

    authCreateBtn.addEventListener("click", async () => {
      clearAuthError();

      const email = authEmail.value.trim();
      const password = authPassword.value;

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showAuthError("Please enter a valid email address.");
        return;
      }
      if (!password || password.length < 6) {
        showAuthError("Password must be at least 6 characters.");
        return;
      }

      authCreateBtn.disabled = true;
      authCreateBtn.innerHTML = '<span class="btn-spinner"></span> Creating account...';
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const niceName = email.split("@")[0];
        try { await updateProfile(cred.user, { displayName: niceName }); } catch (e) { /* non-fatal */ }
      } catch (err) {
        console.error("Create account error:", err);
        showAuthError(friendlyAuthError(err));
      } finally {
        authCreateBtn.disabled = false;
        authCreateBtn.textContent = "Create an Account";
      }
    });

    logoutBtn.addEventListener("click", async () => {
      accountDropdown.classList.add("hidden");
      try {
        await signOut(auth);
      } catch (err) {
        console.error("Sign out error:", err);
      }
    });

    // ---------------- Firestore: per-user wallet ----------------
    function walletCollectionRef() {
      return collection(db, "wallets", currentUser.uid, "items");
    }

    async function loadWallet() {
      wallet = [];
      try {
        const snap = await getDocs(walletCollectionRef());
        wallet = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        wallet.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      } catch (e) {
        console.error("Failed to load wallet:", e);
        wallet = [];
      }
    }

    async function saveWalletItem(item) {
      const { id, ...data } = item;
      await setDoc(doc(walletCollectionRef(), id), data);
    }

    async function deleteWalletItemDoc(id) {
      await deleteDoc(doc(walletCollectionRef(), id));
    }

    function generateRandomCode() {
      return String(Math.floor(100000 + Math.random() * 900000));
    }

    // ---------------- Firestore: shared card-number stock pool ----------------
    // Real 12-digit card numbers live in data.js (CONFIG.CARDS[].cardNumbers).
    // "usedCardNumbers" collection in Firestore tracks which ones have
    // already been handed out — shared across every user/device, so the
    // same number is never given to two different people.
    async function isCardNumberUsed(number) {
      const snap = await getDoc(doc(db, "usedCardNumbers", number));
      return snap.exists();
    }
    async function markCardNumberUsed(number) {
      await setDoc(doc(db, "usedCardNumbers", number), { usedAt: new Date().toISOString() });
    }
    async function releaseCardNumber(number) {
      if (!number) return;
      try {
        await deleteDoc(doc(db, "usedCardNumbers", number));
      } catch (e) {
        console.error("Failed to release card number:", e);
      }
    }
    async function pickCardNumberForCard(cardId) {
      const cardDef = CONFIG.CARDS.find((c) => c.id === cardId);
      if (!cardDef || !Array.isArray(cardDef.cardNumbers)) return null;

      for (const number of cardDef.cardNumbers) {
        const used = await isCardNumberUsed(number);
        if (!used) {
          await markCardNumberUsed(number);
          return number;
        }
      }
      return null; // pool is out of stock
    }

    // ---------------- Render: card grid ----------------
    function renderCardGrid() {
      cardGrid.innerHTML = "";
      CONFIG.CARDS.forEach((card) => {
        const btn = document.createElement("div");
        btn.className = "recharge-card";
        btn.innerHTML = `
          <div class="icon">💳</div>
          <div class="amount">${card.label}</div>
        `;
        btn.addEventListener("click", () => selectCard(card));
        cardGrid.appendChild(btn);
      });
    }

    function selectCard(card) {
      selectedCard = card;
      selectedAmountLabel.textContent = card.label;
      walletView.classList.add("hidden");
      dashboardView.classList.add("hidden");
      selectedView.classList.remove("hidden");
    }

    backBtn.addEventListener("click", () => {
      selectedView.classList.add("hidden");
      dashboardView.classList.remove("hidden");
      selectedCard = null;
    });

    // ---------------- Buy flow ----------------
    buyBtn.addEventListener("click", async () => {
      if (!selectedCard || !currentUser) return;

      buyBtn.disabled = true;
      const originalLabel = buyBtn.textContent;
      buyBtn.innerHTML = '<span class="btn-spinner"></span> Adding...';

      const item = {
        id: "wi_" + Date.now(),
        cardId: selectedCard.id,
        label: selectedCard.label,
        amount: selectedCard.amount,
        code: null,
        cardNumber: null,
        verified: false,
        status: "pending", // pending -> sent
        createdAt: new Date().toISOString()
      };

      try {
        await saveWalletItem(item);
        wallet.unshift(item);

        alert(selectedCard.label + " added to your wallet!");

        selectedView.classList.add("hidden");
        dashboardView.classList.add("hidden");
        walletView.classList.remove("hidden");
        selectedCard = null;
        renderWallet();
      } catch (err) {
        console.error("Failed to add to wallet:", err);
        alert("Couldn't add this to your wallet right now. Please try again.");
      } finally {
        buyBtn.disabled = false;
        buyBtn.textContent = originalLabel;
      }
    });

    // ---------------- Wallet view ----------------
    walletNavBtn.addEventListener("click", async () => {
      dashboardView.classList.add("hidden");
      selectedView.classList.add("hidden");
      walletView.classList.remove("hidden");
      await loadWallet();
      renderWallet();
    });

    walletBackBtn.addEventListener("click", () => {
      walletView.classList.add("hidden");
      dashboardView.classList.remove("hidden");
    });

    function renderWallet() {
      walletList.innerHTML = "";

      if (wallet.length === 0) {
        walletList.innerHTML = '<div class="wallet-empty">No purchases yet. Buy a recharge card to get started.</div>';
        return;
      }

      wallet.forEach((item) => {
        const el = document.createElement("div");
        el.className = "wallet-item";

        const dateStr = new Date(item.createdAt).toLocaleString();
        const statusClass = item.status === "sent" ? "sent" : "pending";
        const statusLabel = item.status === "sent" ? "Sent" : "Pending";
        const amountText = item.amount ? `${item.amount} LKR` : item.label;

        let codeHtml = "";
        let actionHtml = "";

        if (item.status === "sent" && item.code && item.verified) {
          // Code has been verified by the user — reveal the real card number
          // with a smooth "burst" pop animation instead of just printing it.
          const revealNumber = item.cardNumber || item.code;
          const sparks = Array.from({ length: 10 })
            .map((_, i) => {
              const angle = (360 / 10) * i;
              const dist = 50 + Math.random() * 20;
              const dx = Math.round(Math.cos((angle * Math.PI) / 180) * dist);
              const dy = Math.round(Math.sin((angle * Math.PI) / 180) * dist);
              return `<span class="burst-spark" style="--dx:${dx}px; --dy:${dy}px; animation-delay:${(i * 0.02).toFixed(2)}s;"></span>`;
            })
            .join("");
          codeHtml = `
            <div class="wallet-item-code-wrap">
              <span class="burst-ring"></span>
              ${sparks}
              <div class="wallet-item-code">${revealNumber}</div>
            </div>
          `;
          actionHtml = `
            <div class="wallet-row-actions">
              <button class="wallet-contact-btn" data-id="${item.id}">📲 Contact for Payment</button>
            </div>
            <div class="wallet-row-actions" style="margin-top:8px;">
              <button class="wallet-reset-btn" data-id="${item.id}">↺ Reset</button>
              <button class="wallet-delete-btn" data-id="${item.id}">🗑 Delete</button>
            </div>
          `;
        } else if (item.status === "sent" && item.code && !item.verified) {
          // Code already requested but not yet shown — user must enter the
          // 6-digit code (emailed to them) to reveal the real card number.
          codeHtml = `
            <div class="hint" style="margin-top:0; margin-bottom:10px;">A 6-digit code was sent to your email. Enter it below to reveal it here.</div>
            <div class="verify-row">
              <input type="text" inputmode="numeric" maxlength="6" class="verify-input" data-id="${item.id}" placeholder="Enter your 6-digit code" />
              <button class="verify-btn" data-id="${item.id}">Get your recharge card</button>
            </div>
          `;
          actionHtml = `
            <div class="wallet-row-actions" style="margin-top:10px;">
              <button class="wallet-reset-btn" data-id="${item.id}">↺ Reset</button>
              <button class="wallet-delete-btn" data-id="${item.id}">🗑 Delete</button>
            </div>
          `;
        } else {
          actionHtml = `
            <div class="wallet-row-actions">
              <button class="wallet-generate-btn" data-id="${item.id}" style="flex:1;">Generate Code</button>
              <button class="wallet-reset-btn" data-id="${item.id}">↺ Reset</button>
              <button class="wallet-delete-btn" data-id="${item.id}">🗑 Delete</button>
            </div>
          `;
        }

        el.innerHTML = `
          <div class="wallet-item-top">
            <div class="wallet-item-amount">${amountText}</div>
            <div class="wallet-item-status ${statusClass}">${statusLabel}</div>
          </div>
          <div class="wallet-item-date">${dateStr}</div>
          ${codeHtml}
          ${actionHtml}
        `;

        walletList.appendChild(el);
      });

      // Wire up generate buttons
      walletList.querySelectorAll(".wallet-generate-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const itemId = btn.getAttribute("data-id");
          generateCodeForWalletItem(itemId, btn);
        });
      });

      // Wire up verify buttons: user must type the 6-digit code that was
      // emailed to them before it's revealed nicely on screen.
      walletList.querySelectorAll(".verify-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const itemId = btn.getAttribute("data-id");
          const input = walletList.querySelector(`.verify-input[data-id="${itemId}"]`);
          verifyWalletItemCode(itemId, input ? input.value : "");
        });
      });
      walletList.querySelectorAll(".verify-input").forEach((input) => {
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            const itemId = input.getAttribute("data-id");
            verifyWalletItemCode(itemId, input.value);
          }
        });
      });

      // Wire up reset buttons
      walletList.querySelectorAll(".wallet-reset-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const itemId = btn.getAttribute("data-id");
          resetWalletItem(itemId);
        });
      });

      // Wire up delete buttons
      walletList.querySelectorAll(".wallet-delete-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const itemId = btn.getAttribute("data-id");
          deleteWalletItem(itemId);
        });
      });

      // Wire up "Contact for Payment" buttons
      walletList.querySelectorAll(".wallet-contact-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const itemId = btn.getAttribute("data-id");
          contactOwnerForPayment(itemId);
        });
      });
    }

    function contactOwnerForPayment(itemId) {
      const item = wallet.find((w) => w.id === itemId);
      if (!item) return;

      const waNumber = "94" + CONFIG.WHATSAPP_NUMBER.replace(/^0/, "");
      const waMessage = encodeURIComponent(
        "Hi, I'd like to complete payment for my " + item.label +
          " recharge card. Please confirm and send me the payment details."
      );
      window.open("https://wa.me/" + waNumber + "?text=" + waMessage, "_blank");
    }

    async function resetWalletItem(itemId) {
      const item = wallet.find((w) => w.id === itemId);
      if (!item) return;

      const ok = confirm("Reset this " + (item.amount ? item.amount + " LKR" : item.label) + " request? The current code will be cleared and it will go back to pending.");
      if (!ok) return;

      await releaseCardNumber(item.cardNumber);

      item.cardNumber = null;
      item.code = null;
      item.verified = false;
      item.status = "pending";
      item.createdAt = new Date().toISOString();

      try {
        await saveWalletItem(item);
        renderWallet();
      } catch (err) {
        console.error("Failed to reset item:", err);
        alert("Couldn't reset this item right now. Please try again.");
      }
    }

    async function deleteWalletItem(itemId) {
      const item = wallet.find((w) => w.id === itemId);
      if (!item) return;

      const ok = confirm("Delete this " + (item.amount ? item.amount + " LKR" : item.label) + " request from your wallet? This cannot be undone.");
      if (!ok) return;

      try {
        await releaseCardNumber(item.cardNumber);
        await deleteWalletItemDoc(itemId);
        wallet = wallet.filter((w) => w.id !== itemId);
        renderWallet();
      } catch (err) {
        console.error("Failed to delete item:", err);
        alert("Couldn't delete this item right now. Please try again.");
      }
    }

    async function verifyWalletItemCode(itemId, enteredValue) {
      const item = wallet.find((w) => w.id === itemId);
      if (!item) return;

      const entered = (enteredValue || "").trim();
      if (entered.length !== 6 || !/^\d{6}$/.test(entered)) {
        alert("Please enter the 6-digit code that was sent to your email.");
        return;
      }
      if (entered !== item.code) {
        alert("That code doesn't match. Please check your email and try again.");
        return;
      }

      item.verified = true;
      try {
        await saveWalletItem(item);
        renderWallet();
      } catch (err) {
        console.error("Failed to verify item:", err);
        alert("Couldn't verify this code right now. Please try again.");
      }
    }

    async function generateCodeForWalletItem(itemId, btnEl) {
      const item = wallet.find((w) => w.id === itemId);
      if (!item) return;

      if (!window.emailjs) {
        alert("Email service is not available right now. Please try again later.");
        return;
      }

      const code = generateRandomCode();

      if (btnEl) {
        btnEl.disabled = true;
        btnEl.innerHTML = '<span class="btn-spinner"></span> Sending...';
      }
      authLoader.classList.remove("hidden");

      let cardNumber;
      try {
        cardNumber = await pickCardNumberForCard(item.cardId);
      } catch (err) {
        console.error("Failed to pick a card number:", err);
        cardNumber = null;
      }

      if (!cardNumber) {
        authLoader.classList.add("hidden");
        if (btnEl) {
          btnEl.disabled = false;
          btnEl.textContent = "Generate Code";
        }
        alert("Sorry, all " + item.label + " card numbers are currently out of stock. Please contact the owner on WhatsApp.");
        return;
      }

      const templateParams = {
        user_name: currentUser ? currentUser.name : "Unknown User",
        user_email: currentUser ? currentUser.email : "Unknown",
        selected_card: item.label,
        payment_code: code
      };

      try {
        await emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, templateParams);

        item.code = code;
        item.cardNumber = cardNumber;
        item.verified = false;
        item.status = "sent";
        await saveWalletItem(item);
        renderWallet();
        authLoader.classList.add("hidden");

        alert(
          "Thank you! A 6-digit code was sent to your email only. " +
            "Enter it in the wallet to get your recharge card. " +
            "You'll now be redirected to WhatsApp to contact the owner about your payment."
        );

        // WhatsApp is only to contact the owner about payment — the code
        // itself is never included here, it only ever goes to email.
        const waNumber = "94" + CONFIG.WHATSAPP_NUMBER.replace(/^0/, "");
        const waMessage = encodeURIComponent(
          "Hi, I just requested a " + item.label +
            " recharge. Please confirm my payment so I can receive my card."
        );
        window.open("https://wa.me/" + waNumber + "?text=" + waMessage, "_blank");
      } catch (err) {
        console.error("EmailJS send error:", err);
        authLoader.classList.add("hidden");
        await releaseCardNumber(cardNumber); // don't waste the number if email failed
        const detail = (err && (err.text || err.message)) || "Unknown error";
        alert("Failed to send the request: " + detail);
        if (btnEl) {
          btnEl.disabled = false;
          btnEl.textContent = "Generate Code";
        }
      }
    }

    // ---------------- Account dropdown ----------------
    accountBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      accountDropdown.classList.toggle("hidden");
    });

    document.addEventListener("click", (e) => {
      if (!accountDropdown.contains(e.target) && e.target !== accountBtn) {
        accountDropdown.classList.add("hidden");
      }
    });

    // ---------------- Screen switching ----------------
    function showLoginScreen() {
      bootLoader.classList.add("hidden");
      authLoader.classList.add("hidden");
      appScreen.classList.add("hidden");
      loginScreen.classList.remove("hidden");
      clearAuthError();
      authEmail.value = "";
      authPassword.value = "";
    }

    async function showAppScreen() {
      bootLoader.classList.add("hidden");
      loginScreen.classList.add("hidden");
      appScreen.classList.remove("hidden");
      dashboardView.classList.remove("hidden");
      selectedView.classList.add("hidden");
      walletView.classList.add("hidden");
      userNameLabel.textContent = currentUser
        ? `${currentUser.name}\n${currentUser.email}`
        : "—";
      renderCardGrid();

      await loadWallet();
      renderWallet();

      authLoader.classList.add("hidden");
    }

    // ---------------- Firebase auth state (drives the whole app) ----------------
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = {
          uid: user.uid,
          name: user.displayName || (user.email ? user.email.split("@")[0] : "User"),
          email: user.email || ""
        };
        await showAppScreen();
      } else {
        currentUser = null;
        wallet = [];
        showLoginScreen();
      }
    });
  })();
</script>
</body>
</html>
